<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./icon/balance.png" />
    <link rel="apple-touch-icon" href="./icon/balance.png" />
    <link rel="shortcut icon" href="./icon/balance.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegalAI - AI-Driven Legal System</title>
    <meta
      name="description"
      content="AI-powered legal analysis and risk classification for Sri Lankan court judgments"
    />
    <meta name="author" content="LegalAI Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="LegalAI" />
    <meta property="og:description" content="AI-powered legal analysis and risk classification for Sri Lankan court judgments" />
    <meta property="og:type" content="website" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@LegalAI" />

    <script>
      // Simple absolute path construction (works for root-level deployments)
      const iconUrl = `${window.location.origin}/icon/balance.png`;
      document.querySelector('meta[property="og:image"]').setAttribute('content', iconUrl);
      document.querySelector('meta[name="twitter:image"]').setAttribute('content', iconUrl);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
